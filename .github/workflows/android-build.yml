name: Android APK Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Depoyu cek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Sistem bagimliliklari
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev \
            libssl-dev build-essential ccache libltdl-dev

      - name: Python paketleri
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: Buildozer ile APK derle
        run: |
          buildozer android debug

      - name: APK artifact yukle
        uses: actions/upload-artifact@v4
        with:
          name: apk_kurucu-debug-apk
          path: bin/*.apk
