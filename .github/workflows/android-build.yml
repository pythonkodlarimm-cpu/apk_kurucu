name: Android APK Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-22.04

    env:
      ANDROID_HOME: /home/runner/.buildozer/android/platform/android-sdk
      ANDROID_SDK_ROOT: /home/runner/.buildozer/android/platform/android-sdk

    steps:
      - name: Depoyu cek
        uses: actions/checkout@v4

      - name: Python kur
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Java kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Sistem bagimliliklari
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip python3-pip autoconf libtool pkg-config \
            zlib1g-dev cmake libffi-dev libssl-dev build-essential ccache \
            openjdk-17-jdk

      - name: Python paketleri
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: Buildozer on hazirlik
        run: |
          buildozer -v android debug || true

      - name: Android komut satiri aracini bul
        run: |
          SDKMANAGER=""
          if [ -x "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager" ]; then
            SDKMANAGER="$ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager"
          else
            SDKMANAGER="$(find "$ANDROID_SDK_ROOT" -type f -name sdkmanager | head -n 1)"
          fi

          if [ -z "$SDKMANAGER" ]; then
            echo "sdkmanager bulunamadi"
            find "$ANDROID_SDK_ROOT" -maxdepth 4 -type f | sort | head -n 200
            exit 1
          fi

          echo "SDKMANAGER=$SDKMANAGER" >> $GITHUB_ENV

      - name: Android lisanslarini kabul et
        run: |
          yes | "$SDKMANAGER" --licenses || true

      - name: Kararli Android paketlerini kur
        run: |
          yes | "$SDKMANAGER" \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0"

      - name: Kurulan build-tools klasorlerini goster
        run: |
          ls -R "$ANDROID_SDK_ROOT/build-tools" || true

      - name: Buildozer ile APK derle
        run: |
          yes | buildozer -v android debug

      - name: APK artifact yukle
        uses: actions/upload-artifact@v4
        with:
          name: apk_kurucu-debug-apk
          path: bin/*.apk
